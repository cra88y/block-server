[sources.docker_logs]
type = "docker_logs"
include_containers = ["nakama"]
auto_partial_merge = true

[transforms.filter_telemetry]
type = "filter"
inputs = ["docker_logs"]
condition = 'contains(string!(.message), "telemetry_event")'

[transforms.parse_json]
type = "remap"
inputs = ["filter_telemetry"]
source = '''
  # Parse the outer log message
  parsed = parse_json!(.message)
  
  # Extract our fields from the Zap log structure
  .event_type = parsed.event_type
  .timestamp = parsed.timestamp
  .user_id = parsed.user_id
  
  # Parse the nested stringified payload into actual JSON columns for Parquet
  .payload = parse_json!(parsed.payload)
  
  # Drop Docker metadata and keep only the analytics data
  del(.container_created_at)
  del(.container_id)
  del(.container_name)
  del(.image)
  del(.label)
  del(.source_type)
  del(.stream)
  del(.message)
'''

[sinks.r2_lakehouse]
type = "aws_s3"
inputs = ["parse_json"]
bucket = "block"
endpoint = "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
region = "auto"
auth.access_key_id = "${R2_ACCESS_KEY}"
auth.secret_access_key = "${R2_SECRET_KEY}"
compression = "gzip"
key_prefix = "year=%Y/month=%m/day=%d/"

[sinks.r2_lakehouse.encoding]
codec = "json"

[sinks.r2_lakehouse.batch]
max_bytes = 5000000
timeout_secs = 300
